[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
yanked = "warn"
ignore = [
    { id = "RUSTSEC-2026-0097", reason = "rand 0.8 unsoundness with custom logger; transitive via fake/sqlx, no upstream fix yet — track for milestone" },
    { id = "RUSTSEC-2023-0071", reason = "Marvin Attack on rsa crate; transitive via sqlx-mysql (caching_sha2_password). No fix available upstream; mitigated in practice by short-lived MySQL TLS sessions" },
    { id = "RUSTSEC-2026-0104", reason = "Reachable panic in CRL parsing; transitive dep, not on our hot path (no CRL parsing in app code)" },
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
exceptions = []

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
