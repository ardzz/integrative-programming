name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Format + Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85 toolchain
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: cargo check (MSRV)
        run: cargo check --all-targets --locked

  deny:
    name: Cargo Deny (advisories + licenses + bans)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: cargo-deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  test:
    name: Test (MySQL service container)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [check]
    permissions:
      contents: read

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: blog_db
          MYSQL_USER: blog_user
          MYSQL_PASSWORD: blog_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    env:
      DATABASE_URL: mysql://blog_user:blog_password@127.0.0.1:3306/blog_db
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-fallback-secret-do-not-use-in-prod' }}
      RATE_LIMIT_ENABLED: "false"
      ACCESS_TOKEN_TTL_MINUTES: "15"
      REFRESH_TOKEN_TTL_DAYS: "7"
      RUST_LOG: blog_api=info,tower_http=info

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Wait for MySQL to accept connections
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 --silent 2>/dev/null; then
              echo "MySQL ready"
              exit 0
            fi
            echo "waiting for mysql... ($i/30)"
            sleep 2
          done
          echo "MySQL did not become ready in time" >&2
          exit 1

      - name: cargo test
        run: cargo test --tests --locked -- --test-threads=1
